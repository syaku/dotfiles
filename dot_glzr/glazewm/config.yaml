general:
  # Commands to run when the WM has started. This is useful for running a
  # script or launching another application.
  # Example: The below command launches Zebar.
  startup_commands:
    - "shell-exec zebar"
    # scoop manifest の bin: 未指定により shims は作られないため、実体パスを直接指定。
    # current は symlink でバージョン更新に追従する。
    - "shell-exec %USERPROFILE%/scoop/apps/tacky-borders/current/tacky-borders.exe"

  # Commands to run just before the WM is shutdown.
  # Example: The below command kills Zebar.
  shutdown_commands:
    - "shell-exec taskkill /IM zebar.exe /F"
    - "shell-exec taskkill /IM tacky-borders.exe /F"

  # Commands to run after the WM config is reloaded.
  config_reload_commands: []

  # Whether to automatically focus windows underneath the cursor.
  focus_follows_cursor: false

  # Whether to switch back and forth between the previously focused
  # workspace when focusing the current workspace.
  toggle_workspace_on_refocus: false

  cursor_jump:
    # Whether to automatically move the cursor on the specified trigger.
    enabled: true

    # Trigger for cursor jump:
    # - 'monitor_focus': Jump when focus changes between monitors.
    # - 'window_focus': Jump when focus changes between windows.
    trigger: "monitor_focus"

  # How windows should be hidden when switching workspaces.
  # - 'cloak': (Windows-only) Recommended option for Windows.
  # - 'hide': (Windows-only) Legacy option for Windows. Has stability issues with some apps.
  # - 'place_in_corner': Artifically hides the window by placing it in the corner of the
  #   monitor. On macOS, this is always used instead of cloak/hide.
  hide_method: "cloak"

  # Affects which windows get shown in the native Windows taskbar. Has no
  # effect if `hide_method: 'hide'`.
  # - 'true': Show all windows (regardless of workspace).
  # - 'false': Only show windows from the currently shown workspaces.
  show_all_in_taskbar: false

gaps:
  # Whether to scale the gaps with the DPI of the monitor.
  scale_with_dpi: true

  # Gap between adjacent windows.
  inner_gap: "20px"

  # Gap between windows and the screen edge.
  outer_gap:
    top: "60px"
    right: "20px"
    bottom: "20px"
    left: "20px"

window_effects:
  # Visual effects to apply to the focused window.
  focused_window:
    # DWM の 1px ボーダーは tacky-borders と二重に描画され視認性に寄与しないため無効化。
    # フォーカス強調は startup_commands で起動する tacky-borders が担当する。
    border:
      enabled: false
      color: "#3a86ff"

    # Remove the title bar from the window's frame. Note that this can
    # cause rendering issues for some applications.
    hide_title_bar:
      enabled: false

    # Change the corner style of the window's frame.
    # ** Exclusive to Windows 11 due to API limitations.
    corner_style:
      enabled: false
      # Allowed values: 'square', 'rounded', 'small_rounded'.
      style: "square"

    # Change the transparency of the window.
    transparency:
      enabled: false
      opacity: "100%"

  # Visual effects to apply to non-focused windows.
  other_windows:
    # フォーカスのコントラストは tacky-borders の active/inactive 色差で表現する。
    border:
      enabled: false
      color: "#a1a1a1"
    hide_title_bar:
      enabled: false
    corner_style:
      enabled: false
      style: "square"
    transparency:
      enabled: false
      opacity: "100%"

window_behavior:
  # New windows are created in this state whenever possible.
  # Allowed values: 'tiling', 'floating'.
  initial_state: "tiling"

  # Sets the default options for when a new window is created. This also
  # changes the defaults for when the state change commands, like
  # `set-floating`, are used without any flags.
  state_defaults:
    floating:
      # Whether to center floating windows by default.
      centered: true

      # Whether to show floating windows as always on top.
      shown_on_top: false

    fullscreen:
      # Maximize the window if possible. If the window doesn't have a
      # maximize button, then it'll be fullscreen'ed normally instead.
      maximized: false

      # Whether to show fullscreen windows as always on top.
      shown_on_top: false

workspaces:
  - name: "1"
    bind_to_monitor: 0
  - name: "2"
    bind_to_monitor: 1
  - name: "3"
    bind_to_monitor: 0
  - name: "4"
    bind_to_monitor: 1
  - name: "5"
    bind_to_monitor: 0
  - name: "6"
    bind_to_monitor: 1
  - name: "7"
  - name: "8"
  - name: "9"

window_rules:
  - commands: ["ignore"]
    match:
      # Ignores any Zebar windows.
      - window_process: { equals: "zebar" }

      # Ignores picture-in-picture windows for browsers.
      - window_title: { regex: "[Pp]icture.in.[Pp]icture" }
        window_class: { regex: "Chrome_WidgetWin_1|MozillaDialogClass" }

      # Ignore rules for various 3rd-party apps.
      - window_process: { equals: "PowerToys" }
        window_class: { regex: 'HwndWrapper\[PowerToys\.PowerAccent.*?\]' }
      - window_title: { equals: "Command Palette" }
        window_class: { equals: "WinUIDesktopWin32WindowClass" }
      - window_process: { equals: "PowerToys" }
        window_title: { regex: ".*? - Peek" }
      - window_process: { equals: "Lively" }
        window_class: { regex: "HwndWrapper" }
      - window_process: { equals: "EXCEL" }
        window_class: { not_regex: "XLMAIN" }
      - window_process: { equals: "WINWORD" }
        window_class: { not_regex: "OpusApp" }
      - window_process: { equals: "POWERPNT" }
        window_class: { not_regex: "PPTFrameClass" }

      # Task Manager requires admin privileges to manage and should be
      # ignored unless running the WM as admin.
      - window_process: { equals: "Taskmgr" }

      # Delphi VCL standard dialogs (TSelDriveDlg / TRegDirDlg / TTaskManDlg).
      - window_class: { equals: "TSelDriveDlg" }
      - window_class: { equals: "TRegDirDlg" }
      - window_class: { equals: "TTaskManDlg" }

      # keypirinha launcher window.
      - window_process: { equals: "keypirinha-x64" }

      # ATOK IME tooltip windows.
      - window_class: { regex: "^ATOK" }
      - window_title: { regex: "^ATOK" }
      - window_process: { regex: "^ATOK" }

  # Launches system dialogs as floating by default (eg. File Explorer
  # save/open dialog).
  - commands: ["set-floating"]
    match:
      - window_class: { equals: "#32770" }

  # Loupedeck / HWMonitor / EA Desktop are not designed for tiling.
  - commands: ["set-floating"]
    match:
      - window_process: { equals: "LoupedeckConfig" }
      - window_process: { equals: "HWMonitor_x64" }
      - window_process: { equals: "EADesktop" }

  # Fullscreen games should be ignored so the WM does not interfere with
  # exclusive fullscreen / borderless modes.
  - commands: ["ignore"]
    match:
      - window_title: { equals: "Destiny 2" }
      - window_process: { equals: "destiny2" }
      - window_class: { equals: "Tiger D3D Window" }
      - window_process: { equals: "Starfield" }
      - window_process: { equals: "RainbowSix_Vulkan" }
      - window_process: { equals: "Cyberpunk2077" }
      - window_process: { equals: "cod" }
      - window_process: { equals: "Warframe.x64" }
      - window_process: { equals: "FateSamuraiRemnant" }
      - window_process: { equals: "Respawn001" }
      - window_process: { equals: "JREAST_TrainSimulator" }
      - window_process: { equals: "Grim Dawn" }
      - window_process: { equals: "PenDriverPro-Win64-Shipping" }
      - window_process: { equals: "enshrouded" }
      - window_process: { equals: "DD2CCS" }
      - window_process: { equals: "DDDA" }
      - window_process: { equals: "DD2" }
      - window_process: { equals: "stellaris" }
      - window_process: { equals: "TheDivision2" }
      - window_class: { equals: "POEWindowClass" }

  # Steam's window border extends past the normal border size, so trim it
  # back to align with the tiling layout.
  - commands:
      ["adjust-borders --top 0px --right -7px --bottom -7px --left -7px"]
    match:
      - window_process: { equals: "steam" }

keybindings:
  # Shift focus in a given direction (AeroSpace alt-Arrow と対称).
  - commands: ["focus --direction left"]
    bindings: ["alt+left"]
  - commands: ["focus --direction right"]
    bindings: ["alt+right"]
  - commands: ["focus --direction up"]
    bindings: ["alt+up"]
  - commands: ["focus --direction down"]
    bindings: ["alt+down"]

  # Move focused window in a given direction (AeroSpace ctrl-Arrow と対称、
  # Karabiner swap 後の物理 Cmd 位置に対応する Windows の Win キー).
  # 副作用: Windows Snap (Win+Arrow による半分割・最大化・別モニタ移動) を WM に明け渡し.
  - commands: ["move --direction left"]
    bindings: ["win+left"]
  - commands: ["move --direction right"]
    bindings: ["win+right"]
  - commands: ["move --direction up"]
    bindings: ["win+up"]
  - commands: ["move --direction down"]
    bindings: ["win+down"]

  # Resize focused window (AeroSpace cmd-Arrow と対称、Karabiner swap 後の
  # 物理 Ctrl 位置に対応する Windows の Ctrl キー).
  # 副作用: アプリのカーソル単語移動を WM に明け渡し.
  - commands: ["resize --width -2%"]
    bindings: ["ctrl+left"]
  - commands: ["resize --width +2%"]
    bindings: ["ctrl+right"]
  - commands: ["resize --height -2%"]
    bindings: ["ctrl+up"]
  - commands: ["resize --height +2%"]
    bindings: ["ctrl+down"]

  # Disables window management and all other keybindings until alt+shift+p
  # is pressed again.
  - commands: ["wm-toggle-pause"]
    bindings: ["alt+shift+p"]

  # Change tiling direction. This determines where new tiling windows will
  # be inserted.
  - commands: ["toggle-tiling-direction"]
    bindings: ["alt+v"]

  # Change focus from tiling windows -> floating -> fullscreen.
  - commands: ["wm-cycle-focus"]
    bindings: ["alt+space"]

  # Change the focused window to be floating.
  - commands: ["toggle-floating --centered"]
    bindings: ["alt+shift+space"]

  # Change the focused window to be tiling.
  - commands: ["toggle-tiling"]
    bindings: ["alt+t"]

  # Change the focused window to be fullscreen.
  - commands: ["toggle-fullscreen"]
    bindings: ["alt+f", "alt+x"]

  # Minimize focused window.
  - commands: ["toggle-minimized"]
    bindings: ["alt+m"]

  # Close focused window.
  - commands: ["close"]
    bindings: ["alt+shift+q"]

  # Kill GlazeWM process safely.
  - commands: ["wm-exit"]
    bindings: ["alt+shift+e"]

  # Re-evaluate configuration file.
  - commands: ["wm-reload-config"]
    bindings: ["alt+shift+r"]

  # Redraw all windows.
  - commands: ["wm-redraw"]
    bindings: ["alt+shift+w"]

  # Launch CMD terminal. Alternatively, use `shell-exec wt` or
  # `shell-exec %ProgramFiles%/Git/git-bash.exe` to start Windows
  # Terminal and Git Bash respectively.
  - commands: ["shell-exec cmd"]
    bindings: ["alt+enter"]

  # Focus the next/previous active workspace defined in `workspaces` config.
  - commands: ["focus --next-active-workspace"]
    bindings: ["alt+s"]
  - commands: ["focus --prev-active-workspace"]
    bindings: ["alt+a", "alt+shift+t"]

  # Focus the workspace that last had focus.
  - commands: ["focus --recent-workspace"]
    bindings: ["alt+d", "alt+y"]

  # Change focus to a workspace defined in `workspaces` config.
  - commands: ["focus --workspace 1"]
    bindings: ["alt+1"]
  - commands: ["focus --workspace 2"]
    bindings: ["alt+2"]
  - commands: ["focus --workspace 3"]
    bindings: ["alt+3"]
  - commands: ["focus --workspace 4"]
    bindings: ["alt+4"]
  - commands: ["focus --workspace 5"]
    bindings: ["alt+5"]
  - commands: ["focus --workspace 6"]
    bindings: ["alt+6"]
  - commands: ["focus --workspace 7"]
    bindings: ["alt+7"]
  - commands: ["focus --workspace 8"]
    bindings: ["alt+8"]
  - commands: ["focus --workspace 9"]
    bindings: ["alt+9"]

  # Move the focused window's parent workspace to a monitor in a given
  # direction.
  - commands: ["move-workspace --direction left"]
    bindings: ["alt+shift+a"]
  - commands: ["move-workspace --direction right"]
    bindings: ["alt+shift+f"]
  - commands: ["move-workspace --direction up"]
    bindings: ["alt+shift+d"]
  - commands: ["move-workspace --direction down"]
    bindings: ["alt+shift+s"]

  # Move focused window to a workspace defined in `workspaces` config.
  - commands: ["move --workspace 1", "focus --workspace 1"]
    bindings: ["alt+shift+1"]
  - commands: ["move --workspace 2", "focus --workspace 2"]
    bindings: ["alt+shift+2"]
  - commands: ["move --workspace 3", "focus --workspace 3"]
    bindings: ["alt+shift+3"]
  - commands: ["move --workspace 4", "focus --workspace 4"]
    bindings: ["alt+shift+4"]
  - commands: ["move --workspace 5", "focus --workspace 5"]
    bindings: ["alt+shift+5"]
  - commands: ["move --workspace 6", "focus --workspace 6"]
    bindings: ["alt+shift+6"]
  - commands: ["move --workspace 7", "focus --workspace 7"]
    bindings: ["alt+shift+7"]
  - commands: ["move --workspace 8", "focus --workspace 8"]
    bindings: ["alt+shift+8"]
  - commands: ["move --workspace 9", "focus --workspace 9"]
    bindings: ["alt+shift+9"]
