# AeroSpace 設定。Sofle (Vial) 上で WM 操作を左手完結させるためのキーバインド。
#
# 修飾子の前提:
# - 物理 Caps Lock は Vial Layer 4 トリガ (MO(4)) として割当、Layer 4 内のキーが
#   Hyper (Cmd+Opt+Ctrl+Shift) + 対応キーを送信
# - 物理 Cmd キー位置 ↔ 物理 Ctrl キー位置 は karabiner の simple_modifications で全アプリ入替
#   (Karabiner が動作中は OS の Modifier Keys 設定が無効化されるため、入替は karabiner で実現)
# - したがって AeroSpace は karabiner が入替済みの論理キーを受ける
#
# 主軸の運指:
# - focus:  Fn1(左小指) + LAlt(左親指) + WASD(左中指系)         → OS: alt + Arrow
# - move:   Fn1 + 物理 Cmd 位置(Fn1 直上、入替後 Ctrl) + WASD   → OS: ctrl + Arrow
# - resize: Fn1 + 物理 Ctrl 位置(入替後 Cmd) + WASD             → OS: cmd + Arrow
# - workspace 1-9 切替:    LAlt + 数字 (AeroSpace デフォルト、Fn1 不要)
# - window を workspace へ: LAlt + LShift + 数字
#
# Hyper (Caps Hold) 経由は頻度低のオプション操作 (fullscreen / floating / split / flatten /
# back-and-forth / reload) に限定。Caps の物理位置が窮屈なため主軸操作には使わない。
#
# 副作用: Mac 標準の Alt/Cmd/Ctrl + Arrow (単語移動・行頭末・Space 切替等) は AeroSpace に
# 明け渡し。代替手段 (Cocoa Emacs バインド / Home/End 再定義 等) は別タスクで整理。

start-at-login = false

after-startup-command = [
    'exec-and-forget borders active_color=0xffe1e3e4 inactive_color=0xff494d64 width=5.0',
]

# split opposite は normalization 無効が前提
enable-normalization-flatten-containers = false
enable-normalization-opposite-orientation-for-nested-containers = false
accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = false
key-mapping.preset = 'qwerty'

[gaps]
inner.horizontal = 20
inner.vertical = 20
outer.left = 20
outer.bottom = 20
outer.top = 45
outer.right = 20

# 奇数 ws → monitor1, 偶数 ws → monitor2 (GlazeWM の bind_to_monitor と同じ感覚)
[workspace-to-monitor-force-assignment]
1 = 1
2 = 2
3 = 1
4 = 2
5 = 1
6 = 2

[mode.main.binding]
# focus 方向移動: Fn1 + LAlt + WASD → alt + Arrow
alt-up    = 'focus up'
alt-down  = 'focus down'
alt-left  = 'focus left'
alt-right = 'focus right'

# window move 方向: Fn1 + 物理 Cmd 位置 + WASD → 入替後 ctrl + Arrow
ctrl-up    = 'move up'
ctrl-down  = 'move down'
ctrl-left  = 'move left'
ctrl-right = 'move right'

# window resize: Fn1 + 物理 Ctrl 位置 + WASD → 入替後 cmd + Arrow (刻み 50px)
cmd-left  = 'resize width -50'
cmd-right = 'resize width +50'
cmd-up    = 'resize height -50'
cmd-down  = 'resize height +50'

# workspace 切替: LAlt + 数字 (AeroSpace デフォルト、Fn1 不要)
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# window を workspace へ送る: LAlt + LShift + 数字
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'

# 以下は Caps Hyper 経由 (右手 OK・頻度低のオプション操作)

# 直前 workspace に戻る
cmd-alt-ctrl-shift-y = 'workspace-back-and-forth'

# tiling direction toggle: フォーカスウィンドウを新コンテナで包み、次に開くウィンドウだけ別方向に分割
cmd-alt-ctrl-shift-v = 'split opposite'

# tree の中間コンテナを潰して整地
cmd-alt-ctrl-shift-f = 'flatten-workspace-tree'

# floating <-> tiling 切替
cmd-alt-ctrl-shift-space = 'layout floating tiling'

# AeroSpace 独自の fullscreen (Mission Control のフルスクリーンではない)
cmd-alt-ctrl-shift-x = 'fullscreen'

# 設定再読込
cmd-alt-ctrl-shift-slash = 'reload-config'

# Mac 標準は温存: Cmd+Q (close), Cmd+Tab (アプリ切替), Mission Control 等は bind しない

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.SystemSettings'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'org.pqrs.Karabiner-EventViewer'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'org.pqrs.Karabiner-Elements.Preferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.runningwithcrayons.Alfred'
run = 'layout floating'
