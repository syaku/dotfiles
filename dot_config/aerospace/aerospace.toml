# AeroSpace 設定。GlazeWM (~/.glaze-wm/config.yaml) と対称な操作感を目指す。
# 修飾子は karabiner で Caps Lock を Hyper (Cmd+Opt+Ctrl+Shift) に変換した前提。

start-at-login = false

after-startup-command = [
    'exec-and-forget borders active_color=0xffe1e3e4 inactive_color=0xff494d64 width=5.0',
]

enable-normalization-flatten-containers = false
enable-normalization-opposite-orientation-for-nested-containers = false
accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = false
key-mapping.preset = 'qwerty'

[gaps]
inner.horizontal = 20
inner.vertical = 20
outer.left = 20
outer.bottom = 20
outer.top = 45
outer.right = 20

# GlazeWM の bind_to_monitor 1/2 と同様: 奇数 → monitor1, 偶数 → monitor2
[workspace-to-monitor-force-assignment]
1 = 1
2 = 2
3 = 1
4 = 2
5 = 1
6 = 2

[mode.main.binding]
# focus 方向移動
cmd-alt-ctrl-shift-h = 'focus left'
cmd-alt-ctrl-shift-j = 'focus down'
cmd-alt-ctrl-shift-k = 'focus up'
cmd-alt-ctrl-shift-l = 'focus right'

# workspace 切替
cmd-alt-ctrl-shift-1 = 'workspace 1'
cmd-alt-ctrl-shift-2 = 'workspace 2'
cmd-alt-ctrl-shift-3 = 'workspace 3'
cmd-alt-ctrl-shift-4 = 'workspace 4'
cmd-alt-ctrl-shift-5 = 'workspace 5'
cmd-alt-ctrl-shift-6 = 'workspace 6'

# 直前 workspace に戻る
cmd-alt-ctrl-shift-y = 'workspace-back-and-forth'

# モード遷移
cmd-alt-ctrl-shift-r = 'mode resize'
cmd-alt-ctrl-shift-m = 'mode move'

# tiling direction toggle (GlazeWM の Alt+V 相当)
# フォーカスウィンドウを新コンテナで包み、次に開くウィンドウだけ別方向に分割する。
# split は normalization 無効が前提（上の 2 つを false にしている）。
cmd-alt-ctrl-shift-v = 'split opposite'

# tree の中間コンテナを潰して整地する。split を多用して構造が複雑になったときに使う。
cmd-alt-ctrl-shift-f = 'flatten-workspace-tree'

# floating <-> tiling 切替
cmd-alt-ctrl-shift-space = 'layout floating tiling'

# AeroSpace 独自の fullscreen (Mission Control のフルスクリーンではない)
cmd-alt-ctrl-shift-x = 'fullscreen'

# 設定再読込
cmd-alt-ctrl-shift-slash = 'reload-config'

# Mac 標準は温存: Cmd+Q (close), Cmd+Tab (アプリ切替), Mission Control 等は bind しない

[mode.resize.binding]
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
enter = 'mode main'
esc = 'mode main'

[mode.move.binding]
# Hyper+M で入って hjkl でウィンドウ移動、数字で workspace 間移動
h = 'move left'
j = 'move down'
k = 'move up'
l = 'move right'

1 = ['move-node-to-workspace 1', 'mode main']
2 = ['move-node-to-workspace 2', 'mode main']
3 = ['move-node-to-workspace 3', 'mode main']
4 = ['move-node-to-workspace 4', 'mode main']
5 = ['move-node-to-workspace 5', 'mode main']
6 = ['move-node-to-workspace 6', 'mode main']

f = 'layout floating tiling'

enter = 'mode main'
esc = 'mode main'

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.SystemSettings'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'org.pqrs.Karabiner-EventViewer'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'org.pqrs.Karabiner-Elements.Preferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.runningwithcrayons.Alfred'
run = 'layout floating'
